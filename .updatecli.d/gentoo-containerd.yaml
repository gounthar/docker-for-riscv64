---
# UpdateCLI manifest for tracking containerd versions in Gentoo overlay
# This manifest monitors docker-for-riscv64 releases and updates the containerd version

name: "Update Gentoo containerd package version"

sources:
  # Track latest Docker Engine release (source of containerd binary)
  dockerRelease:
    kind: githubrelease
    name: "Get latest Docker Engine release"
    spec:
      owner: "gounthar"
      repository: "docker-for-riscv64"
      token: "{{ requiredEnv .github.token }}"
      versionfilter:
        kind: regex
        pattern: '^v([0-9]+[.][0-9]+[.][0-9]+)-riscv64$'
    transformers:
      - trimprefix: "v"
      - trimsuffix: "-riscv64"

  # Extract containerd version from release assets
  containerdVersion:
    kind: shell
    name: "Extract containerd version from release"
    dependson:
      - dockerRelease
    spec:
      command: |
        DOCKER_VERSION="{{ source `dockerRelease` }}"
        # Extract the containerd version from the release's RPM asset name.
        VERSION=$(gh release view "v${DOCKER_VERSION}-riscv64" --repo gounthar/docker-for-riscv64 --json assets --jq '.assets[].name' | grep "containerd-" | grep ".rpm" | grep -oE '[0-9]+[.][0-9]+[.][0-9]+' | head -1)
        # Fail instead of emitting an empty value when the RPM is not published yet
        # (e.g. the release exists but its assets are still uploading). An empty
        # source would otherwise overwrite a valid CONTAINERD_VERSION with an empty string.
        if [ -z "$VERSION" ]; then
          echo "No containerd RPM version found in v${DOCKER_VERSION}-riscv64 assets (assets still uploading?)" >&2
          exit 1
        fi
        echo "$VERSION"
      environments:
        - name: PATH
        - name: GITHUB_TOKEN
          from: "{{ requiredEnv .github.token }}"

conditions:
  # Verify the containerd binary exists in the release
  containerdBinaryExists:
    kind: shell
    name: "Verify containerd binary in release"
    disablesourceinput: true
    spec:
      command: |
        DOCKER_VERSION="{{ source `dockerRelease` }}"
        gh release view "v${DOCKER_VERSION}-riscv64" --repo gounthar/docker-for-riscv64 --json assets --jq '.assets[].name' | grep "containerd-" | grep -q ".rpm"
      environments:
        - name: PATH
        - name: GITHUB_TOKEN
          from: "{{ requiredEnv .github.token }}"

targets:
  # Update version in generation script
  updateGenerationScript:
    name: "Update containerd version in generate-gentoo-overlay-modular.sh"
    kind: file
    sourceid: containerdVersion
    spec:
      file: "generate-gentoo-overlay-modular.sh"
      matchpattern: 'CONTAINERD_VERSION="([0-9]+[.][0-9]+[.][0-9]+)"'
      replacepattern: 'CONTAINERD_VERSION="{{ source `containerdVersion` }}"'

