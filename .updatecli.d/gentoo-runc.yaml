---
# UpdateCLI manifest for tracking runc versions in Gentoo overlay

name: "Update Gentoo runc package version"

sources:
  dockerRelease:
    kind: githubrelease
    name: "Get latest Docker Engine release"
    spec:
      owner: "gounthar"
      repository: "docker-for-riscv64"
      token: "{{ requiredEnv .github.token }}"
      versionfilter:
        kind: regex
        pattern: '^v([0-9]+[.][0-9]+[.][0-9]+)-riscv64$'
    transformers:
      - trimprefix: "v"
      - trimsuffix: "-riscv64"

  runcVersion:
    kind: shell
    name: "Extract runc version from release"
    dependson:
      - dockerRelease
    spec:
      command: |
        DOCKER_VERSION="{{ source `dockerRelease` }}"
        # Extract the runc version from the release's RPM asset name.
        VERSION=$(gh release view "v${DOCKER_VERSION}-riscv64" --repo gounthar/docker-for-riscv64 --json assets --jq '.assets[].name' | grep "runc-" | grep ".rpm" | grep -oE '[0-9]+[.][0-9]+[.][0-9]+' | head -1)
        # Fail instead of emitting an empty value when the RPM is not published yet
        # (e.g. the release exists but its assets are still uploading). An empty
        # source would otherwise overwrite a valid RUNC_VERSION with an empty string.
        if [ -z "$VERSION" ]; then
          echo "No runc RPM version found in v${DOCKER_VERSION}-riscv64 assets (assets still uploading?)" >&2
          exit 1
        fi
        echo "$VERSION"
      environments:
        - name: PATH
        - name: GITHUB_TOKEN
          from: "{{ requiredEnv .github.token }}"

conditions:
  runcBinaryExists:
    kind: shell
    name: "Verify runc binary in release"
    disablesourceinput: true
    spec:
      command: |
        DOCKER_VERSION="{{ source `dockerRelease` }}"
        gh release view "v${DOCKER_VERSION}-riscv64" --repo gounthar/docker-for-riscv64 --json assets --jq '.assets[].name' | grep "runc-" | grep -q ".rpm"
      environments:
        - name: PATH
        - name: GITHUB_TOKEN
          from: "{{ requiredEnv .github.token }}"

targets:
  updateGenerationScript:
    name: "Update runc version in generate-gentoo-overlay-modular.sh"
    kind: file
    sourceid: runcVersion
    spec:
      file: "generate-gentoo-overlay-modular.sh"
      matchpattern: 'RUNC_VERSION="([0-9]+[.][0-9]+[.][0-9]+)"'
      replacepattern: 'RUNC_VERSION="{{ source `runcVersion` }}"'

